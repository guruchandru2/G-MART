<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUITS</title>
    <link rel="stylesheet" href="../css/stationery.css">
</head>

<body>
    <header>
        <div class="logo">G-MART</div>
        <nav>
            <a href="home.html">Home</a>

        </nav>
        <div class="cart">
        </div>

    <section class="heading">
        <h2>Fresh Fruits</h2>

    </section>
    <section class="filter">
        <div>
            <label>Rating</label>
            <select id="ratingFilter">

                <option value="3">3⭐&above</option>
                <option value="5">5⭐ Only</option>
            </select>
        </div>
        
            <div>
                <label>Sort By</label>
            
            <select id="sortBy">
                <option value="default">Default</option>
                <option value="low">Price Low-High</option>
                <option value="high">Price High-Low</option>
                <option value="name">Name</option>
        </select>

        </div>
        
    </section>
    <section class="products">

    <div class="card" data-price="120" data-rating="2">
        <a href="details/apple.html">
            <img src="../images/p18.jpg" alt="">
            <h3>APPLE</h3>
            <p>1kg=₹200</p>
            <p>⭐⭐</p>
        </a>
    </div>

    <div class="card" data-price="180" data-rating="4">
        <a href="details/orange.html">
            <img src="../images/p19.jpg" >

            <p>⭐⭐⭐⭐</p>
        </a>
    </div>

    <div class="card" data-price="250" data-rating="4">
        <a href="details/banana.html">
            <img src="../images/p20.jpg">
            <h3>BANANA</h3>
            <p>1kg=₹30</p>
            <p>⭐⭐⭐⭐</p>
        </a>
    </div>

    <div class="card" data-price="300" data-rating="3">
        <a href="details/mango.html">
            <img src="../images/p21.jpg">
            <h3>MANGO</h3>
            <p>1kg=₹60</p>
            <p>⭐⭐⭐</p>
        </a>
    </div>

    <div class="card" data-price="150" data-rating="5">
        <a href="details/guava.html">
            <img src="../images/p22.jpg">
            <h3>GUAVA</h3>
            <p>1kg=₹100</p>
            <p>⭐⭐⭐⭐⭐</p>
